<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 Cosmic Guess Advanced</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="starfield"></canvas>
<header>
  <h1>🚀 Cosmic Guess Advanced</h1>
</header>

<div id="timer">⏱ Time left: --s</div>

  <p id="intro">Guess the hidden number before your rocket runs out of fuel and time!</p>
  
  <div class="game-container">
    <button id="startBtn" onclick="startGame()">🚀 Start Mission</button>
    <br><br>

    <label for="difficulty">Mission Zone:</label>
    <select id="difficulty" onchange="setDifficulty()">
      <option value="50">Easy (1–50)</option>
      <option value="200">Medium (1–200)</option>
      <option value="500">Hard (1–500)</option>
      <option value="999">Black Hole Mode (1–999)</option>
    </select>
    <br><br>

    <label for="timerSelect">Timer Limit:</label>
    <select id="timerSelect" onchange="setTimerLimit()">
      <option value="10">10s</option>
      <option value="20" selected>20s</option>
      <option value="40">40s</option>
    </select>
    <br><br>

    <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="999">
    <button onclick="checkGuess()">Launch Guess</button>
    <button id="playAgain" style="display:none;" onclick="restartGame()">Play Again</button>
    <button id="warpDrive" onclick="useWarpDrive()">⚡ Warp Drive Hint (-2 Fuel)</button>
  </div>
  <div id="message">Click 🚀 Start Mission to begin!</div>
  <div id="scoreboard">🏆 Best Score: None yet</div>

  <div id="fuelCell" style="display:none;">🔋 Fuel Cell! Click me!</div>

  <div id="cosmicEvent" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script src="script.js"></script>
<audio id="soundLaunch" src="launch.mp3" preload="auto"></audio>
<audio id="soundAlarm" src="alarm.mp3" preload="auto"></audio>
<audio id="soundVictory" src="victory.mp3" preload="auto"></audio>
<audio id="soundFail" src="fail.mp3" preload="auto"></audio>
</body>

</html>
